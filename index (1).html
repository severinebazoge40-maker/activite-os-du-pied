<div id="activite-os-pied">
  <style>
    #activite-os-pied{font-family:Arial,sans-serif;color:var(--foreground,#172033);max-width:1100px;margin:auto}
    #activite-os-pied *{box-sizing:border-box}
    #activite-os-pied .intro{margin:0 0 12px}
    #activite-os-pied .status{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
    #activite-os-pied .score{font-weight:500}
    #activite-os-pied .board{position:relative;width:100%;aspect-ratio:1848/1370;background:var(--card,#fff);border:2px solid var(--border,#cbd5e1);border-radius:14px;overflow:hidden;touch-action:none}
    #activite-os-pied .board img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;pointer-events:none}
    #activite-os-pied .zone{position:absolute;transform:translate(-50%,-50%);width:clamp(30px,4.4vw,48px);height:clamp(30px,4.4vw,48px);border:2px dashed var(--primary,#2563eb);border-radius:50%;background:color-mix(in srgb,var(--background,#fff) 78%,transparent);color:var(--foreground,#172033);display:flex;align-items:center;justify-content:center;font-weight:500;padding:0;cursor:pointer}
    #activite-os-pied .zone.over,#activite-os-pied .zone:focus{outline:3px solid var(--ring,#60a5fa)}
    #activite-os-pied .zone.correct{border-style:solid;background:var(--primary,#2563eb);color:var(--primary-foreground,#fff);width:auto;min-width:44px;max-width:150px;height:auto;min-height:34px;border-radius:10px;padding:5px 8px;font-size:clamp(10px,1.45vw,15px);line-height:1.1}
    #activite-os-pied .bank{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;min-height:52px}
    #activite-os-pied .tile,#activite-os-pied button.action{font:inherit;border:1px solid var(--border,#94a3b8);border-radius:10px;padding:9px 12px;background:var(--secondary,#eef2ff);color:var(--secondary-foreground,#172033);cursor:pointer;touch-action:none}
    #activite-os-pied .tile.selected{outline:3px solid var(--ring,#60a5fa);background:var(--primary,#2563eb);color:var(--primary-foreground,#fff)}
    #activite-os-pied .tile.dragging{opacity:.55}
    #activite-os-pied button.action{background:var(--primary,#2563eb);color:var(--primary-foreground,#fff);border-color:transparent}
    #activite-os-pied .message{min-height:24px;font-weight:500}
    #activite-os-pied .message.bad{color:var(--destructive,#b91c1c)}
    #activite-os-pied .message.good{color:var(--foreground,#166534)}
    #activite-os-pied .ghost{position:fixed;z-index:9999;pointer-events:none;transform:translate(-50%,-50%);box-shadow:0 8px 24px rgba(0,0,0,.2)}
    @media(max-width:560px){#activite-os-pied .intro{font-size:14px}.zone.correct{max-width:90px}.tile{padding:8px 9px}}
  </style>
  <p class="intro"><strong>Consigne :</strong> placez chaque vignette sur le repère correspondant. Sur tablette, touchez une vignette puis le repère. Vous pouvez aussi la faire glisser.</p>

      {id:'calcaneus',label:'Calcanéus',x:24.4,y:61.7},{id:'naviculaire',label:'Naviculaire (scaphoïde)',x:47.8,y:35.5},{id:'cuboide',label:'Cuboïde',x:34.8,y:68.3},
      {id:'cuneiforme_medial',label:'Cunéiforme médial',x:61.0,y:37.8},{id:'cuneiforme_intermediaire',label:'Cunéiforme intermédiaire',x:62.8,y:32.4},{id:'cuneiforme_lateral',label:'Cunéiforme latéral',x:34.8,y:74.3},
      {id:'premier_metatarsien',label:'1er métatarsien (médial)',x:60.0,y:47.4},{id:'cinquieme_metatarsien',label:'5e métatarsien (latéral)',x:45.1,y:84.0},
      {id:'phalanges',label:'Phalanges',x:75.7,y:51.4},{id:'phalanges_distales',label:'Phalanges distales',x:77.8,y:80.2},
      {id:'malleole_laterale',label:'Malléole latérale (externe)',x:23.3,y:44.8}
    ];
    let selected=null,placed=new Set(),ghost=null,dragTile=null;
    function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
    function makeZones(){items.forEach((it,i)=>{const z=document.createElement('button');z.type='button';z.className='zone';z.dataset.id=it.id;z.style.left=it.x+'%';z.style.top=it.y+'%';z.textContent=i+1;z.setAttribute('aria-label','Repère '+(i+1));z.addEventListener('click',()=>attempt(z));board.appendChild(z)})}
    function makeTiles(){bank.innerHTML='';shuffle([...items]).forEach(it=>{const t=document.createElement('button');t.type='button';t.className='tile';t.dataset.id=it.id;t.textContent=it.label;t.addEventListener('click',()=>select(t));t.addEventListener('pointerdown',e=>startDrag(e,t));bank.appendChild(t)})}
    function select(t){if(placed.has(t.dataset.id))return;root.querySelectorAll('.tile').forEach(x=>x.classList.remove('selected'));selected=t;selected.classList.add('selected');message.textContent='Touchez maintenant le bon repère.';message.className='message'}
    function attempt(z,tile){const t=tile||selected;if(!t||z.classList.contains('correct'))return;if(t.dataset.id===z.dataset.id){const it=items.find(x=>x.id===t.dataset.id);z.textContent=it.label;z.classList.add('correct');z.setAttribute('aria-label',it.label+', réponse correcte');placed.add(it.id);t.remove();selected=null;message.textContent='Bonne réponse !';message.className='message good';score.textContent=placed.size+' / '+items.length+' placés';if(placed.size===items.length)message.textContent='Bravo ! Tous les os sont correctement placés.'}else{message.textContent='Ce n’est pas le bon repère. Essayez encore.';message.className='message bad';z.animate([{transform:'translate(-50%,-50%)'},{transform:'translate(-46%,-50%)'},{transform:'translate(-54%,-50%)'},{transform:'translate(-50%,-50%)'}],{duration:260})}}
    function startDrag(e,t){if(e.pointerType==='mouse'&&e.button!==0)return;dragTile=t;t.setPointerCapture(e.pointerId);t.classList.add('dragging');ghost=t.cloneNode(true);ghost.className='tile ghost';document.body.appendChild(ghost);moveGhost(e);t.addEventListener('pointermove',moveGhost);t.addEventListener('pointerup',endDrag,{once:true});t.addEventListener('pointercancel',endDrag,{once:true})}
    function moveGhost(e){if(ghost){ghost.style.left=e.clientX+'px';ghost.style.top=e.clientY+'px'}root.querySelectorAll('.zone').forEach(z=>z.classList.remove('over'));const el=document.elementFromPoint(e.clientX,e.clientY);if(el&&el.classList.contains('zone'))el.classList.add('over')}
    function endDrag(e){const t=dragTile;const el=document.elementFromPoint(e.clientX,e.clientY);if(el&&el.classList.contains('zone'))attempt(el,t);if(ghost)ghost.remove();ghost=null;dragTile=null;t.classList.remove('dragging');t.removeEventListener('pointermove',moveGhost);root.querySelectorAll('.zone').forEach(z=>z.classList.remove('over'))}
    function reset(){placed.clear();selected=null;message.textContent='';message.className='message';score.textContent='0 / '+items.length+' placés';root.querySelectorAll('.zone').forEach((z,i)=>{z.className='zone';z.textContent=i+1;z.setAttribute('aria-label','Repère '+(i+1))});makeTiles()}
    root.querySelector('.reset').addEventListener('click',reset);makeZones();makeTiles();
  })();
  </script>
</div>
